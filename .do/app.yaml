name: wb-iati-intelligence-agent
services:
- name: web
  source_dir: /
  github:
    repo: ""
    branch: main
  run_command: echo "Starting WB IATI Agent" && python -m http.server $PORT
  environment_slug: python
  instance_count: 1
  instance_size_slug: basic-xxs
  routes:
  - path: /
  health_check:
    http_path: /
  envs:
  - key: PORT
    value: "8080"
    type: GENERAL
  - key: WB_AGENT_ENDPOINT
    value: "https://mrngtcmmhzbbdopptwzoirop.agents.do-ai.run"
    type: GENERAL
  - key: WB_API_KEY
    value: "3vgEVfMeM5_rggpNoeLpe0agHBAN42yD"
    type: SECRET

static_sites:
- name: wb-iati-frontend
  source_dir: /
  index_document: index.html
  error_document: index.html
  routes:
  - path: /
  envs: []